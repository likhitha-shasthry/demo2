<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category 2 — Candidate Details</title>
  <link rel="stylesheet" href="cat2.css" />
</head>

<body>
  <main class="page-shell">
    <section class="page-header">
      <h1>Category 2 — Candidate Details</h1>
      <p>Enter numeric values for each item below.</p>
    </section>

    <section class="page-body">
      <form class="portal-form category-form" id="category2-form">
        <div class="input-group">
          <label for="c2-fdp-workshop">FDP / Workshop</label>
          <input id="c2-fdp-workshop" type="number" min="0" step="1" required
            placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c2-mooc-courses">MOOC Courses</label>
          <input id="c2-mooc-courses" type="number" min="0" step="1" required
            placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c2-portfolio-event">Portfolio / Event Coordination</label>
          <input id="c2-portfolio-event" type="number" min="0" step="1" required
            placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c2-seminar-conference">Seminar / Webinar / Conferences</label>
          <input id="c2-seminar-conference" type="number" min="0" step="1" required
            placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c2-university-academic">University Academic Work</label>
          <input id="c2-university-academic" type="number" min="0" step="1" required
            placeholder="0" />
        </div>

        <div class="button-row">
          <button type="button" class="btn btn-edit">Edit</button>
          <button type="submit" class="btn btn-submit">Save and Next</button>
        </div>
      </form>
    </section>
  </main>
</body>

</html>

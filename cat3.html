<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Category 3 — Candidate Details</title>
  <link rel="stylesheet" href="cat3.css" />
</head>

<body>
  <main class="page-shell">
    <section class="page-header">
      <h1>Category 3 — Candidate Details</h1>
      <p>Enter numeric values for each item below.</p>
    </section>

    <section class="page-body">
      <form class="portal-form category-form" id="category3-form">
        <div class="input-group">
          <label for="c3-journal-publications">Journal Publications</label>
          <input id="c3-journal-publications" type="number" min="0" step="1" required placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c3-books-chapters">Books / Book Chapters</label>
          <input id="c3-books-chapters" type="number" min="0" step="1" required placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c3-sponsored-projects">Sponsored Projects</label>
          <input id="c3-sponsored-projects" type="number" min="0" step="1" required placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c3-consultancy-projects">Consultancy Projects</label>
          <input id="c3-consultancy-projects" type="number" min="0" step="1" required placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c3-phd-guidance">PhD Guidance</label>
          <input id="c3-phd-guidance" type="number" min="0" step="1" required placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c3-phd-registration">PhD Registration</label>
          <input id="c3-phd-registration" type="number" min="0" step="1" required placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c3-student-project-guidance">Student Project Guidance</label>
          <input id="c3-student-project-guidance" type="number" min="0" step="1" required placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c3-product-development">Product Development</label>
          <input id="c3-product-development" type="number" min="0" step="1" required placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c3-application-development">Application Development</label>
          <input id="c3-application-development" type="number" min="0" step="1" required placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c3-patents">Patents</label>
          <input id="c3-patents" type="number" min="0" step="1" required placeholder="0" />
        </div>

        <div class="input-group">
          <label for="c3-copyright">Copyright</label>
          <input id="c3-copyright" type="number" min="0" step="1" required placeholder="0" />
        </div>

        <div class="button-row">
          <button type="button" class="btn btn-edit">Edit</button>
          <button type="submit" class="btn btn-submit">Save and Next</button>
        </div>
      </form>
    </section>
  </main>
</body>

</html>

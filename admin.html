<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Candidate Review</title>
  <link rel="stylesheet" href="admin.css" />
</head>

<body>
  <main class="admin-shell">
    <header class="admin-header">
      <h1>Admin Dashboard</h1>
      <p>Pending and reviewed candidate lists. Click a candidate to open the detail review page.</p>
    </header>

    <section class="admin-grid">
      <div class="panel panel-left">
        <h2>Pending Candidates</h2>
        <div id="candidate-list" class="candidate-list"></div>
      </div>

      <div class="panel panel-right">
        <h2>Reviewed Candidates</h2>
        <div id="reviewed-list" class="candidate-list"></div>
      </div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>

</html>
